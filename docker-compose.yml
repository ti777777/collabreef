services:
  collabreef-nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx-runtime
    image: collabreef/collabreef-nginx:local
    container_name: collabreef-nginx
    ports:
      - "8080:80"
    depends_on:
      - collabreef-api
      - collabreef-collab
    restart: unless-stopped

  collabreef-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: app-runtime
    image: collabreef/collabreef:local
    container_name: collabreef-api
    command: ["./api"]
    volumes:
      - "./bin:/usr/local/app/bin"
    environment:
      - PORT=8080
      - DB_DRIVER=sqlite3
      - DB_DSN=/usr/local/app/bin/collabreef.db
      - APP_DISABLE_SIGNUP=${APP_DISABLE_SIGNUP}
      - APP_SECRET=${APP_SECRET}
      - RUNNER_REGISTRATION_TOKEN=${RUNNER_REGISTRATION_TOKEN}
    restart: unless-stopped

  collabreef-collab:
    build:
      context: .
      dockerfile: Dockerfile
      target: app-runtime
    image: collabreef/collabreef:local
    container_name: collabreef-collab
    command: ["node", "collab/src/index.js"]
    environment:
      - PORT=3000
      - APP_SECRET=${APP_SECRET}
      - GRPC_ADDR=collabreef-api:50051
    depends_on:
      - collabreef-api
    restart: unless-stopped

  collabreef-runner:
    build:
      context: ./runner
      dockerfile: Dockerfile
    image: collabreef/collabreef-runner:local
    container_name: collabreef-runner
    environment:
      - CB_INSTANCE_ADDR=collabreef-api:50051
      # Must match RUNNER_REGISTRATION_TOKEN on collabreef-api (or omit both
      # and register with the token from GET /api/v1/admin/runners/registration-token).
      - CB_RUNNER_REGISTRATION_TOKEN=${RUNNER_REGISTRATION_TOKEN}
      - CB_RUNNER_NAME=default-runner
      - CB_RUNNER_LABELS=ubuntu-latest:docker://node:20-bullseye
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./bin/runner-data:/data
    depends_on:
      - collabreef-api
    restart: unless-stopped
